<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>標案詳情｜工程案件管理</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="appRoot" style="visibility:hidden;">
<div class="shell">

  <header class="topbar">
    <div class="brand">
      <h1 id="pageTitle">標案詳情</h1>
    </div>
    <div class="topbar-actions">
      <span class="sync-badge" id="syncBadge">— 模式偵測中 —</span>
      <span class="user-badge" id="userBadge" hidden></span>
      <button class="btn btn-ghost btn-sm" id="btnLogout" hidden>登出</button>
      <a class="btn btn-ghost" href="index.html">← 返回總覽</a>
    </div>
  </header>

  <nav class="breadcrumb">
    <a href="index.html">案件總覽</a><span class="sep">/</span><span class="current" id="crumbName">—</span>
  </nav>

  <!-- 圖框標題欄 -->
  <section class="title-block" id="titleBlock">
    <!-- injected -->
  </section>

  <!-- 頁籤 -->
  <div class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="net" role="tab">工程進度</button>
    <button class="tab-btn" data-tab="flow" role="tab">養工流程</button>
    <button class="tab-btn" data-tab="todo" role="tab">本周待做事項</button>
  </div>

  <!-- 工程進度 -->
  <section class="tab-panel active" id="panel-net">
    <div class="panel-head">
      <div>
        <h3>工程進度</h3>
        <p>點選查看該階段的日期、備註與現場照片，點圖片可全螢幕檢視。</p>
      </div>
      <button class="btn btn-sm btn-primary" id="btnAddTask">＋ 新增階段</button>
    </div>
    <div class="stage-timeline" id="stageTimeline"><!-- injected --></div>
  </section>

  <!-- 養工流程 -->
  <section class="tab-panel" id="panel-flow">
    <div class="panel-head">
      <div>
        <h3>養工流程</h3>
      </div>
    </div>
    <div class="flow-list" id="flowList"><!-- injected --></div>
  </section>

  <!-- 本周待做事項 -->
  <section class="tab-panel" id="panel-todo">
    <div class="panel-head">
      <div>
        <h3>本周待做事項</h3>
        <p>點日期新增當天的事項，點事項可標記完成。可以選擇同步到 Google 日曆。</p>
      </div>
      <button class="btn btn-sm btn-primary" id="btnAddTodo">＋ 新增事項</button>
    </div>
    <div class="cal-header">
      <button class="btn btn-ghost btn-sm" id="calPrevMonth" aria-label="上個月">‹</button>
      <h4 id="calMonthLabel">—</h4>
      <button class="btn btn-ghost btn-sm" id="calNextMonth" aria-label="下個月">›</button>
    </div>
    <div class="cal-grid" id="calGrid"><!-- injected --></div>
  </section>

  <div class="foot">Create by Aggie Yang</div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose" aria-label="關閉">&times;</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="上一張">&#8249;</button>
  <img id="lbImage" src="" alt="">
  <button class="lb-nav lb-next" id="lbNext" aria-label="下一張">&#8250;</button>
  <div class="lb-caption" id="lbCaption"></div>
</div>

<!-- 編輯標案 modal -->
<div class="modal-backdrop" id="editCaseModal">
  <div class="modal">
    <h3>編輯標案</h3>
    <div class="field">
      <label>標案名稱</label>
      <input type="text" id="e-name" placeholder="例：大墩十九街人行道改善工程">
    </div>
    <div class="field">
      <label>案號</label>
      <input type="text" id="e-code" placeholder="NT-2026-0XX">
    </div>
    <div class="field-row">
      <div class="field">
        <label>契約金額（元）</label>
        <input type="number" id="e-contract" placeholder="0">
      </div>
      <div class="field">
        <label>實支金額（元）</label>
        <input type="number" id="e-executed" placeholder="0">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>已派工金額（元）</label>
        <input type="number" id="e-dispatched" placeholder="0">
      </div>
      <div class="field">
        <label>後擴金額（元）</label>
        <input type="number" id="e-expansion" placeholder="0">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>未派工金額（元）</label>
        <input type="number" id="e-undispatched" placeholder="0">
      </div>
      <div class="field">
        <label>可派工金額（元）</label>
        <input type="number" id="e-available" placeholder="0">
      </div>
    </div>
    <div class="field">
      <label>承包廠商</label>
      <input type="text" id="e-contractor" placeholder="廠商名稱">
    </div>
    <div class="field">
      <label>最新進度</label>
      <input type="text" id="e-progress" placeholder="例：瀝青鋪面施作中，預計 XX 完成">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancelEdit">取消</button>
      <button class="btn btn-primary" id="btnSaveEdit">儲存變更</button>
    </div>
  </div>
</div>

<!-- 關卡詳情 modal（燈箱式檢視）-->
<div class="modal-backdrop" id="stageDetailModal">
  <div class="modal stage-detail-modal">
    <button class="modal-close-x" id="stageDetailClose" aria-label="關閉">&times;</button>
    <div id="stageDetailModalBody"><!-- injected --></div>
  </div>
</div>

<!-- 編輯階段 modal -->
<div class="modal-backdrop" id="editTaskModal">
  <div class="modal">
    <h3>編輯階段</h3>
    <div class="field"><label>階段名稱</label><input type="text" id="et-name" placeholder="例：開工前置作業"></div>
    <div class="field"><label>負責單位／人員</label><input type="text" id="et-owner" placeholder="例：順成營造 / 王工務"></div>
    <div class="field">
      <label>備註（每行一項，會自動變成條列）</label>
      <textarea id="et-note" placeholder="開工報告已完成&#10;三書送審已完成&#10;現場放樣確認完畢" rows="4"></textarea>
    </div>
    <div class="field-row">
      <div class="field"><label>開始日期</label><input type="date" id="et-start"></div>
      <div class="field"><label>結束日期</label><input type="date" id="et-end"></div>
    </div>
    <div class="field">
      <label>狀態</label>
      <select id="et-status">
        <option value="pending">未開始</option>
        <option value="progress">進行中</option>
        <option value="done">已完成</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancelEditTask">取消</button>
      <button class="btn btn-primary" id="btnSaveEditTask">儲存變更</button>
    </div>
  </div>
</div>

<!-- 新增階段 modal -->
<div class="modal-backdrop" id="addTaskModal">
  <div class="modal">
    <h3>新增階段</h3>
    <div class="field"><label>階段名稱</label><input type="text" id="t-name" placeholder="例：開工前置作業"></div>
    <div class="field"><label>負責單位／人員</label><input type="text" id="t-owner" placeholder="例：順成營造 / 王工務"></div>
    <div class="field">
      <label>備註（每行一項，會自動變成條列）</label>
      <textarea id="t-note" placeholder="開工報告已完成&#10;三書送審已完成&#10;現場放樣確認完畢" rows="4"></textarea>
    </div>
    <div class="field-row">
      <div class="field"><label>開始日期</label><input type="date" id="t-start"></div>
      <div class="field"><label>結束日期</label><input type="date" id="t-end"></div>
    </div>
    <div class="field">
      <label>狀態</label>
      <select id="t-status">
        <option value="pending">未開始</option>
        <option value="progress">進行中</option>
        <option value="done">已完成</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancelTask">取消</button>
      <button class="btn btn-primary" id="btnSaveTask">儲存階段</button>
    </div>
  </div>
</div>

<!-- 編輯待辦 modal -->
<div class="modal-backdrop" id="editTodoModal">
  <div class="modal">
    <h3>編輯本周待辦</h3>
    <div class="field"><label>事項內容</label><input type="text" id="ed-text" placeholder="例：會勘路面刨除範圍"></div>
    <div class="field-row">
      <div class="field"><label>日期</label><input type="date" id="ed-due"></div>
      <div class="field">
        <label>優先度</label>
        <select id="ed-priority">
          <option value="high">高</option>
          <option value="mid">中</option>
          <option value="low">低</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label class="cal-toggle-label">
        <input type="checkbox" id="ed-done">
        已完成
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btnDeleteTodo">刪除事項</button>
      <button class="btn btn-ghost" id="btnCancelEditTodo">取消</button>
      <button class="btn btn-primary" id="btnSaveEditTodo">儲存變更</button>
    </div>
  </div>
</div>

<!-- 新增待辦 modal -->
<div class="modal-backdrop" id="addTodoModal">
  <div class="modal">
    <h3>新增本周待辦</h3>
    <div class="field"><label>事項內容</label><input type="text" id="d-text" placeholder="例：會勘路面刨除範圍"></div>
    <div class="field-row">
      <div class="field"><label>日期</label><input type="date" id="d-due"></div>
      <div class="field">
        <label>優先度</label>
        <select id="d-priority">
          <option value="high">高</option>
          <option value="mid">中</option>
          <option value="low">低</option>
        </select>
      </div>
    </div>

    <div class="field cal-toggle-field" id="calToggleField" hidden>
      <label class="cal-toggle-label">
        <input type="checkbox" id="d-cal-toggle">
        同時建立 Google 日曆提醒並通知對方
      </label>
    </div>
    <div id="calFields" hidden>
      <div class="field-row">
        <div class="field"><label>開始時間</label><input type="datetime-local" id="d-cal-start"></div>
        <div class="field"><label>結束時間</label><input type="datetime-local" id="d-cal-end"></div>
      </div>
      <div class="field">
        <label>通知對象 Email（多人用逗號分隔）</label>
        <input type="text" id="d-cal-emails" placeholder="例：director@example.com">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnCancelTodo">取消</button>
      <button class="btn btn-primary" id="btnSaveTodo">儲存事項</button>
    </div>
  </div>
</div>

</div><!-- /#appRoot -->

<script src="js/calendar.js"></script>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
<script src="https://accounts.google.com/gsi/client" onload="gisLoaded()" async defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/data.js"></script>
<script src="js/project.js"></script>
</body>
</html>
